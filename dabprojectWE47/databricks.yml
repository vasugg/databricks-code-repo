# This is a Databricks asset bundle definition for dabprojectWE47.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabprojectWE47
  uuid: 2b3ae7c0-c715-41ff-ad8c-f30c5fd916bd

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-7db79dbc-9764.cloud.databricks.com
    variables:
      catalog: workspace
      schema: default
  prod:
    mode: production
    workspace:
      host: https://dbc-7db79dbc-9764.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/vasu8788@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/vasu8788@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: we47catalog
      schema: prod
    permissions:
      - user_name: vasu8788@gmail.com
        level: CAN_MANAGE
